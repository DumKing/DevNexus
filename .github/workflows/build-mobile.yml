name: build-mobile

on:
  workflow_dispatch:
  push:
    branches:
      - experiment-mobile-packaging

permissions:
  contents: read

jobs:
  android:
    name: android-aarch64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android project
        run: npm run mobile:android:init -- --ci

      - name: Build Android 12 installable debug APK
        run: npm run mobile:android:build:debug:ci

      - name: Build Android release APK and AAB
        run: npm run mobile:android:build -- --ci --apk --aab --target aarch64

      - name: Verify Android artifacts
        run: |
          DEBUG_APK="$(find src-tauri/gen/android/app/build/outputs/apk -type f -name '*debug*.apk' | head -n 1)"
          RELEASE_UNSIGNED_APK="$(find src-tauri/gen/android/app/build/outputs/apk -type f -name '*release-unsigned.apk' | head -n 1)"
          RELEASE_AAB="$(find src-tauri/gen/android/app/build/outputs/bundle -type f -name '*.aab' | head -n 1)"

          if [ -z "$DEBUG_APK" ]; then
            echo "::error::No debug APK was produced. Android 12 side-load testing needs the debug-signed APK, not the unsigned release APK."
            exit 1
          fi

          if [ -z "$RELEASE_AAB" ]; then
            echo "::error::No release AAB was produced for store/manual signing."
            exit 1
          fi

          echo "Installable Android 12 debug APK: $DEBUG_APK"
          if [ -n "$RELEASE_UNSIGNED_APK" ]; then
            echo "::notice::Release APK is unsigned and should not be installed directly: $RELEASE_UNSIGNED_APK"
          fi
          echo "Release AAB for signing: $RELEASE_AAB"

      - name: Upload Android 12 installable APK
        uses: actions/upload-artifact@v4
        with:
          name: DevNexus-android12-aarch64-installable
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*debug*.apk
          if-no-files-found: error

      - name: Upload Android release signing inputs
        uses: actions/upload-artifact@v4
        with:
          name: DevNexus-android-aarch64-release-signing-inputs
          path: |
            src-tauri/gen/android/app/build/outputs/**/*release-unsigned.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: error

  ios-ipa:
    name: ios-aarch64-unsigned-ipa
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize iOS project
        run: npm run mobile:ios:init -- --ci

      - name: Build unsigned iOS app
        run: |
          rustup target add aarch64-apple-ios
          npm run mobile:ios:build -- --ci --target aarch64 --open &
          TAURI_IOS_BUILD_PID="$!"
          trap 'kill "$TAURI_IOS_BUILD_PID" 2>/dev/null || true' EXIT

          ADDR_FILE="${TMPDIR:-/tmp/}com.devnexus.desktop-server-addr"
          for _ in $(seq 1 120); do
            if [ -s "$ADDR_FILE" ]; then
              break
            fi
            sleep 1
          done

          if [ ! -s "$ADDR_FILE" ]; then
            echo "::error::Tauri iOS build did not expose its Xcode options server"
            exit 1
          fi

          cd src-tauri/gen/apple
          xcodebuild \
            -project devnexus.xcodeproj \
            -scheme devnexus_iOS \
            -configuration release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios-derived-data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH="$(find src-tauri/gen/apple/build/ios-derived-data/Build/Products -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No iOS .app bundle was produced"
            exit 1
          fi
          rm -rf unsigned-ipa
          mkdir -p unsigned-ipa/Payload
          cp -R "$APP_PATH" unsigned-ipa/Payload/
          ditto -c -k --keepParent unsigned-ipa/Payload DevNexus-ios-aarch64-unsigned.ipa
          ls -lh DevNexus-ios-aarch64-unsigned.ipa

      - name: Upload unsigned iOS IPA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DevNexus-ios-aarch64-unsigned-ipa
          path: |
            DevNexus-ios-aarch64-unsigned.ipa
          if-no-files-found: error
