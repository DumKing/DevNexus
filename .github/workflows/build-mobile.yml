name: build-mobile

on:
  workflow_dispatch:
  push:
    branches:
      - experiment-mobile-packaging

permissions:
  contents: read

jobs:
  android:
    name: android-aarch64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android project
        run: npm run mobile:android:init -- --ci

      - name: Build Android APK and AAB
        run: npm run mobile:android:build -- --ci --apk --aab --target aarch64

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DevNexus-android-aarch64
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: error

  ios-ipa:
    name: ios-aarch64-unsigned-ipa
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize iOS project
        run: npm run mobile:ios:init -- --ci

      - name: Build unsigned iOS app
        run: npm run mobile:ios:build -- --ci --target aarch64 -- CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=

      - name: Package unsigned IPA
        run: |
          APP_PATH="$(find src-tauri/gen/apple -type d -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No iOS .app bundle was produced"
            exit 1
          fi
          rm -rf unsigned-ipa
          mkdir -p unsigned-ipa/Payload
          cp -R "$APP_PATH" unsigned-ipa/Payload/
          ditto -c -k --keepParent unsigned-ipa/Payload DevNexus-ios-aarch64-unsigned.ipa
          ls -lh DevNexus-ios-aarch64-unsigned.ipa

      - name: Upload unsigned iOS IPA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DevNexus-ios-aarch64-unsigned-ipa
          path: |
            DevNexus-ios-aarch64-unsigned.ipa
          if-no-files-found: error
