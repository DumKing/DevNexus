name: Auto Merge PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: auto-merge-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  configure-auto-merge:
    name: Configure auto-merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Wait for required checks
        run: gh pr checks "$PR_URL" --required --watch --fail-fast
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Approve trusted PR
        if: contains(fromJSON('["DumKing", "dependabot[bot]"]'), github.event.pull_request.user.login)
        run: gh pr review "$PR_URL" --approve --body "Trusted author auto-approval after repository policy checks are configured."
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Enable squash auto-merge
        run: gh pr merge "$PR_URL" --auto --squash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
